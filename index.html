<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Barcode Scanner</title>
  <style>
    :root {
      --bg: #0b1020;
      --panel: #151b2f;
      --text: #eef2ff;
      --muted: #a7b0d6;
      --accent: #6ea8fe;
      --good: #57d38c;
      --bad: #ff7b7b;
      --border: #2a3354;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, #09101d 0%, #11172a 100%);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .app {
      width: min(760px, 100%);
      background: rgba(21, 27, 47, 0.95);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      overflow: hidden;
    }

    .header {
      padding: 22px 22px 10px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 1.7rem;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
    }

    .content {
      padding: 22px;
      display: grid;
      gap: 18px;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    button {
      border: 0;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 0.95rem;
      cursor: pointer;
      background: var(--accent);
      color: #07101f;
      font-weight: 700;
    }

    button.secondary {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .reader-shell {
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid var(--border);
      background: #000;
      min-height: 320px;
    }

    #reader {
      width: 100%;
    }

    .status, .result {
      background: rgba(9, 14, 27, 0.9);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
    }

    .status strong, .result strong {
      display: block;
      margin-bottom: 8px;
    }

    .ok { color: var(--good); }
    .error { color: var(--bad); }

    .result-value {
      font-size: 1.1rem;
      word-break: break-word;
    }

    .meta {
      font-size: 0.92rem;
      color: var(--muted);
      margin-top: 8px;
    }

    .footer {
      border-top: 1px solid var(--border);
      padding: 14px 22px 22px;
      color: var(--muted);
      font-size: 0.92rem;
    }

    code {
      background: rgba(255,255,255,0.06);
      padding: 2px 6px;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <h1>Barcode Scanner</h1>
      <p>Use your device camera to scan common barcodes and QR codes directly in the browser.</p>
    </div>

    <div class="content">
      <div class="controls">
        <button id="startBtn">Start Scanner</button>
        <button id="stopBtn" class="secondary" disabled>Stop Scanner</button>
      </div>

      <div class="reader-shell">
        <div id="reader"></div>
      </div>

      <div class="status" id="statusBox">
        <strong>Status</strong>
        <div id="statusText">Ready. Tap <em>Start Scanner</em> to request camera access.</div>
      </div>

      <div class="result">
        <strong>Last Scan</strong>
        <div id="resultText" class="result-value">Nothing scanned yet.</div>
        <div id="resultMeta" class="meta"></div>
      </div>
    </div>

    <div class="footer">
      Host this file on GitHub Pages. Camera access requires <code>https://</code>, which GitHub Pages provides.
    </div>
  </div>

  <script src="https://unpkg.com/html5-qrcode" defer></script>
  <script>
    let scanner = null;
    let isRunning = false;

    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const statusText = document.getElementById('statusText');
    const resultText = document.getElementById('resultText');
    const resultMeta = document.getElementById('resultMeta');

    function setStatus(message, type = 'normal') {
      statusText.textContent = message;
      statusText.className = type === 'error' ? 'error' : type === 'ok' ? 'ok' : '';
    }

    function setResult(text, format = '') {
      resultText.textContent = text;
      resultMeta.textContent = format ? `Format: ${format}` : '';
    }

    async function startScanner() {
      if (isRunning) return;

      if (!window.isSecureContext) {
        setStatus('Camera access is blocked because this page is not running in a secure context (HTTPS).', 'error');
        return;
      }

      try {
        startBtn.disabled = true;
        setStatus('Requesting camera access...');

        scanner = new Html5Qrcode('reader');

        await scanner.start(
          { facingMode: 'environment' },
          {
            fps: 10,
            qrbox: { width: 280, height: 160 },
            aspectRatio: 1.7778,
            rememberLastUsedCamera: true,
            supportedScanTypes: [Html5QrcodeScanType.SCAN_TYPE_CAMERA]
          },
          (decodedText, decodedResult) => {
            const format = decodedResult?.result?.format?.formatName || decodedResult?.result?.format?.format || 'unknown';
            setResult(decodedText, format);
            setStatus('Scan successful.', 'ok');
          },
          () => {
          }
        );

        isRunning = true;
        stopBtn.disabled = false;
        setStatus('Scanner is running. Point the camera at a barcode.', 'ok');
      } catch (error) {
        console.error(error);
        setStatus(`Could not start scanner: ${error?.message || error}`, 'error');
        startBtn.disabled = false;
      }
    }

    async function stopScanner() {
      if (!scanner || !isRunning) return;

      try {
        await scanner.stop();
        await scanner.clear();
        isRunning = false;
        scanner = null;
        stopBtn.disabled = true;
        startBtn.disabled = false;
        setStatus('Scanner stopped.');
      } catch (error) {
        console.error(error);
        setStatus(`Could not stop scanner cleanly: ${error?.message || error}`, 'error');
      }
    }

    startBtn.addEventListener('click', startScanner);
    stopBtn.addEventListener('click', stopScanner);

    window.addEventListener('beforeunload', async () => {
      if (scanner && isRunning) {
        try {
          await scanner.stop();
          await scanner.clear();
        } catch (_) {}
      }
    });
  </script>
</body>
</html>
